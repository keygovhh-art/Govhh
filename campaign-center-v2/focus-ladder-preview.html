<!doctype html>
<html lang="yi" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d6659">
<title>גבהה Focus Memory V2</title>
<style>html,body,iframe{margin:0;width:100%;height:100%;border:0;background:#f6f2ea}body{overflow:hidden}iframe{display:block}</style>
</head>
<body>
<iframe id="app" src="index.html?focusPreview=2" title="גבהה Focus Memory V2"></iframe>
<script>
const app=document.getElementById('app');
app.addEventListener('load',function(){
 const doc=app.contentDocument;
 if(doc.querySelector('script[data-focus-memory-v2]'))return;
 const script=doc.createElement('script');
 script.src='focus-memory-v2.js?v=1';
 script.setAttribute('data-focus-memory-v2','yes');
 script.onload=function(){
   doc.querySelector('link[data-ultra-clarity-v4]')?.remove();
   const clarity=doc.createElement('link');
   clarity.rel='stylesheet';
   clarity.href='ultra-clarity-v4.css?v=1';
   clarity.setAttribute('data-ultra-clarity-v4','yes');
   doc.head.appendChild(clarity);
 };
 doc.head.appendChild(script);
});
</script>
</body>
</html>
